<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{width:1280px;height:640px}
  .card{position:relative;width:1280px;height:640px;overflow:hidden;
    background:url('_card-base-2x.png') center/cover no-repeat;
    font-family:"Helvetica Neue",Arial,sans-serif}
  .block{position:absolute;left:0;right:0;bottom:30px;text-align:center}
  .word{font-size:58px} .tag{font-size:22px;margin-top:34px}
  
  *{margin:0;padding:0;box-sizing:border-box}
  .word{font-weight:800;letter-spacing:-1.5px;line-height:1;color:#0b1d3a;
    text-shadow:0 2px 16px rgba(255,255,255,.95),0 1px 0 #fff,0 0 22px rgba(255,255,255,.9)}
  .tag{font-weight:600;letter-spacing:.2px;color:#0b1d3a;
    text-shadow:0 2px 14px rgba(255,255,255,.97),0 1px 0 #fff,0 0 18px rgba(255,255,255,.9)}
  .tag .fix{position:relative;display:inline-block}
  .tag .old{text-decoration:line-through;text-decoration-thickness:3px;text-decoration-color:#0b1d3a}
  .tag .hw{position:absolute;left:50%;top:-0.92em;transform:translateX(-50%) rotate(-6deg);
    font-family:"Bradley Hand","Marker Felt","Noteworthy",cursive;font-weight:700;white-space:nowrap;color:#0b1d3a}

</style></head><body><div class="card"><div class="block">
  <div class="word">Lamar</div><div class="tag">Designed to work with your <span class="fix"><span class="hw">thinking</span><span class="old">throwing</span></span> style.</div></div></div></body></html>
